<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Quest ⚔️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+TC:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0b0e;
  --bg2:      #2e314a;
  --panel:    #1a1520;
  --panel2:   #221c2a;
  --border:   rgba(180,140,60,0.25);
  --border2:  rgba(180,140,60,0.5);
  --gold:     #c9a84c;
  --gold2:    #f0d080;
  --gold-dim: rgba(201,168,76,0.12);
  --red:      #c0392b;
  --red2:     #e74c3c;
  --teal:     #1abc9c;
  --teal2:    #2ecc71;
  --purple:   #8e44ad;
  --purple2:  #a855f7;
  --blue:     #2980b9;
  --blue2:    #3498db;
  --text:     #e8dfc8;
  --text2:    #a09070;
  --text3:    #5a5040;
  --radius:   4px;
  --radius-md:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(140,80,20,0.15) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,140,60,0.03) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,140,60,0.03) 40px);
}
.app{max-width:560px;margin:0 auto;padding:20px 16px 80px;}

/* ── HEADER ── */
.site-header{
  text-align:center;
  padding:20px 0 16px;
  margin-bottom:16px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.site-header::before,.site-header::after{
  content:'✦';
  position:absolute; top:50%; transform:translateY(-50%);
  color:var(--gold); font-size:14px;
}
.site-header::before{left:0;}
.site-header::after{right:0;}
.hero-avatar{
  width:64px;height:64px;border-radius:50%;
  border:2px solid var(--gold);
  background:var(--panel2);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
  margin:0 auto 8px;
  box-shadow:0 0 16px rgba(201,168,76,0.3);
  overflow:hidden;
}
.hero-avatar img{width:100%;height:100%;object-fit:cover;}
.hero-name{
  font-family:'Cinzel',serif;
  font-size:20px;font-weight:700;
  color:var(--gold2);
  letter-spacing:1px;
  text-shadow:0 0 20px rgba(201,168,76,0.4);
}
.hero-title{font-size:11px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

/* ── WEEKLY TRACKER ── */
.tracker-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px 14px 12px;
  margin-bottom:12px;
  position:relative;
}
.tracker-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.tracker-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.tracker-title{
  font-family:'Cinzel',serif;
  font-size:12px;font-weight:600;
  color:var(--gold);letter-spacing:1px;
}
.week-nav{display:flex;align-items:center;gap:6px;}
.week-nav button{
  background:var(--panel2);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text2);
  font-size:12px;padding:3px 8px;cursor:pointer;
  font-family:'Share Tech Mono',monospace;
  transition:all 0.15s;
}
.week-nav button:hover{border-color:var(--gold);color:var(--gold);}
.week-nav button:disabled{opacity:0.3;cursor:default;}
.week-label{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);min-width:100px;text-align:center;}

.tracker-table{width:100%;border-collapse:collapse;font-size:11px;}
.tracker-table th{
  font-family:'Share Tech Mono',monospace;
  color:var(--text3);font-weight:400;
  padding:2px 3px;text-align:center;width:28px;
}
.tracker-table th.col-name{text-align:left;width:auto;color:var(--text2);}
.tracker-table td{padding:2px 3px;text-align:center;}
.tracker-table td.task-name{
  text-align:left;font-size:11px;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100px;padding-right:6px;
}
.dot{
  width:20px;height:20px;border-radius:3px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;
  background:var(--panel2);
  border:1px solid var(--border);
  transition:all 0.2s;
}
.dot.done-0{background:rgba(192,57,43,0.2);border-color:rgba(192,57,43,0.4);color:#e74c3c;}
.dot.done-1{background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.4);color:var(--gold);}
.dot.done-2{background:rgba(46,204,113,0.15);border-color:rgba(46,204,113,0.4);color:var(--teal2);}
.dot.done-3{background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.4);color:var(--purple2);}
.dot.done-4{background:rgba(52,152,219,0.15);border-color:rgba(52,152,219,0.4);color:var(--blue2);}
.dot.done-5{background:rgba(230,126,34,0.15);border-color:rgba(230,126,34,0.4);color:#f39c12;}
.dot.done-6{background:rgba(231,76,60,0.15);border-color:rgba(231,76,60,0.4);color:#e67e22;}
.dot.done-7{background:rgba(26,188,156,0.15);border-color:rgba(26,188,156,0.4);color:var(--teal);}
.dot.empty{background:var(--panel2);border-color:var(--border);color:transparent;}
.dot.future{background:transparent;border:1px dashed var(--border);color:transparent;}
.dot.today-col{border-color:var(--gold2)!important;}

/* ── STREAK ── */
.streak-row{
  display:flex;gap:10px;margin-bottom:12px;
}
.streak-box{
  flex:1;background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:12px 14px;
  position:relative;overflow:hidden;
}
.streak-box::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.sb-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.sb-icon{font-size:20px;line-height:1;}
.sb-icon.pop{animation:iconPop 0.4s ease;}
@keyframes iconPop{0%{transform:scale(1)}50%{transform:scale(1.5) rotate(-8deg)}100%{transform:scale(1)}}
.sb-val{
  font-family:'Share Tech Mono',monospace;
  font-size:28px;font-weight:400;color:var(--gold2);
  text-shadow:0 0 12px rgba(240,208,128,0.4);
}
.sb-lbl{font-size:10px;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;}

/* ── XP BAR ── */
.xp-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:12px 14px;margin-bottom:12px;
}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.lv-badge{
  font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  background:var(--gold-dim);border:1px solid var(--border2);
  color:var(--gold2);padding:3px 12px;border-radius:2px;
  letter-spacing:0.5px;
}
.xp-nums{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);}
.xp-track{
  height:8px;border-radius:2px;
  background:var(--panel2);border:1px solid var(--border);overflow:hidden;
}
.xp-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  transition:width 0.8s cubic-bezier(.4,1.3,.6,1);
  box-shadow:0 0 8px rgba(201,168,76,0.5);
}

/* ── STATS ── */
.stats-row{display:flex;gap:8px;margin-bottom:14px;}
.stat-box{
  flex:1;background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:9px 12px;
}
.stat-val{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--gold2);}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px;}

/* ── TABS ── */
.tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border);}
.tab{
  padding:8px 16px;background:transparent;border:none;
  font-family:'Cinzel',serif;font-size:12px;
  color:var(--text2);cursor:pointer;position:relative;
  letter-spacing:0.5px;transition:color 0.15s;
}
.tab.active{color:var(--gold2);}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--gold);}

/* ── QUEST LIST ── */
.quest-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.quest-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:11px 14px;
  display:flex;align-items:center;gap:11px;
  cursor:pointer;
  transition:border-color 0.15s,background 0.15s,transform 0.1s;
  position:relative;overflow:hidden;
}
.quest-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--gold);opacity:0;transition:opacity 0.2s;
}
.quest-card:hover{border-color:var(--border2);background:var(--panel2);}
.quest-card:hover::before{opacity:1;}
.quest-card:active{transform:scale(0.99);}
.quest-card.done{opacity:0.4;}
.quest-card.done .q-title{text-decoration:line-through;}
.quest-card.flash{animation:questFlash 0.5s ease;}
@keyframes questFlash{
  0%{background:var(--panel)}
  40%{background:rgba(201,168,76,0.12);border-color:var(--gold);}
  100%{background:var(--panel)}
}
.q-check{
  width:22px;height:22px;flex-shrink:0;
  border:1.5px solid var(--text3);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:transparent;
  transition:all 0.2s;font-family:'Share Tech Mono',monospace;
}
.quest-card.done .q-check{background:var(--teal);border-color:var(--teal);color:#001a12;}
.q-icon{
  font-size:22px;flex-shrink:0;width:32px;text-align:center;
}
.q-icon img{width:28px;height:28px;object-fit:contain;}
.q-body{flex:1;min-width:0;}
.q-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;}
.q-desc{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-reward-tag{
  display:inline-block;margin-top:4px;
  font-size:10px;color:var(--teal);
  padding:1px 7px;border-radius:2px;
  border:1px solid rgba(26,188,156,0.3);
  background:rgba(26,188,156,0.08);
  font-family:'Share Tech Mono',monospace;
}
.q-xp{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;font-weight:400;
  color:var(--gold);flex-shrink:0;
  background:var(--gold-dim);
  border:1px solid var(--border);
  padding:3px 8px;border-radius:2px;
}

.empty-state{
  text-align:center;padding:36px 20px;
  color:var(--text3);font-size:13px;
  font-family:'Cinzel',serif;letter-spacing:0.5px;
}
.empty-state .e-icon{font-size:32px;margin-bottom:10px;}

.add-btn{
  width:100%;padding:10px;
  border:1px dashed var(--border2);
  border-radius:var(--radius-md);
  background:transparent;
  font-family:'Cinzel',serif;font-size:12px;
  color:var(--gold);cursor:pointer;
  letter-spacing:0.5px;
  transition:all 0.15s;margin-bottom:20px;
}
.add-btn:hover{background:var(--gold-dim);border-color:var(--gold);}

/* ── REWARDS ── */
.reward-section{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px;
}
.rs-title{
  font-family:'Cinzel',serif;font-size:11px;
  color:var(--gold);letter-spacing:1px;
  margin-bottom:10px;
}
.reward-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;border-bottom:1px solid rgba(180,140,60,0.08);
  font-size:13px;
}
.reward-item:last-child{border-bottom:none;padding-bottom:0;}
.ri-icon{font-size:16px;}
.ri-name{flex:1;color:var(--text);font-size:12px;}
.ri-ok{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--teal);}
.ri-lock{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);}

/* ── MILESTONE ── */
.milestone{
  display:none;
  background:rgba(201,168,76,0.08);
  border:1px solid var(--border2);
  border-radius:var(--radius-md);
  padding:10px 14px;font-size:13px;color:var(--gold2);
  margin-bottom:12px;animation:slideDown 0.3s ease;
}
.milestone.show{display:block;}
@keyframes slideDown{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── OVERLAY / MODAL ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
  z-index:100;padding:20px;
}
.overlay.open{display:flex;}
.modal{
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:var(--radius-md);
  padding:22px;width:100%;max-width:400px;
  box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(201,168,76,0.1);
  animation:modalIn 0.25s ease;
  position:relative;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
@keyframes modalIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{
  font-family:'Cinzel',serif;font-size:16px;font-weight:600;
  color:var(--gold2);margin-bottom:16px;letter-spacing:0.5px;
}
.form-label{
  display:block;
  font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text2);margin-bottom:5px;margin-top:12px;
}
.form-input{
  width:100%;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 10px;
  font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--text);
  outline:none;transition:border-color 0.15s;
}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--text3);}
textarea.form-input{resize:vertical;min-height:52px;}
.icon-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.icon-opt{
  width:36px;height:36px;border-radius:var(--radius);
  background:var(--bg2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:all 0.1s;
}
.icon-opt img{width:26px;height:26px;object-fit:contain;}
.icon-opt:hover{border-color:var(--border2);}
.icon-opt.sel{border-color:var(--gold);background:var(--gold-dim);}
.xp-row{display:flex;gap:6px;margin-top:6px;}
.xp-pick{
  flex:1;padding:7px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg2);
  font-family:'Share Tech Mono',monospace;font-size:12px;
  cursor:pointer;color:var(--text2);transition:all 0.1s;text-align:center;
}
.xp-pick:hover{border-color:var(--border2);}
.xp-pick.sel{border-color:var(--gold);background:var(--gold-dim);color:var(--gold2);}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.btn-cancel{
  flex:1;padding:9px;border:1px solid var(--border);
  border-radius:var(--radius);background:transparent;
  font-family:'Noto Sans TC',sans-serif;font-size:13px;
  color:var(--text2);cursor:pointer;transition:all 0.1s;
}
.btn-cancel:hover{border-color:var(--border2);color:var(--text);}
.btn-save{
  flex:2;padding:9px;border:none;border-radius:var(--radius);
  background:var(--gold);color:#1a1200;
  font-family:'Cinzel',serif;font-size:13px;font-weight:600;
  cursor:pointer;letter-spacing:0.5px;transition:background 0.15s;
}
.btn-save:hover{background:var(--gold2);}

/* ── LEVEL UP ── */
.lu-inner{text-align:center;padding:8px 0;}
.lu-crest{
  width:72px;height:72px;border-radius:50%;
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;margin:0 auto 14px;
  background:var(--gold-dim);
  box-shadow:0 0 30px rgba(201,168,76,0.4);
  animation:luPulse 1.5s infinite;
}
@keyframes luPulse{0%,100%{box-shadow:0 0 20px rgba(201,168,76,0.4)}50%{box-shadow:0 0 50px rgba(201,168,76,0.8)}}
.lu-title{
  font-family:'Cinzel',serif;font-size:22px;font-weight:700;
  color:var(--gold2);margin-bottom:6px;
  text-shadow:0 0 20px rgba(240,208,128,0.5);
}
.lu-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.btn-ok{
  width:100%;padding:11px;border:none;border-radius:var(--radius);
  background:var(--gold);color:#1a1200;
  font-family:'Cinzel',serif;font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:0.5px;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--panel2);border:1px solid var(--border2);
  color:var(--gold2);
  padding:9px 18px;border-radius:var(--radius);
  font-size:13px;font-family:'Share Tech Mono',monospace;
  opacity:0;transition:all 0.2s;
  pointer-events:none;z-index:500;
  white-space:nowrap;max-width:88vw;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* custom image hint */
.img-hint{font-size:10px;color:var(--text3);margin-top:4px;font-family:'Share Tech Mono',monospace;}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="site-header">
    <div class="hero-avatar" id="hero-avatar">
      <!-- 放你的人物圖: <img src="assets/hero.png"> -->
      ⚔️
    </div>
    <div class="hero-name" id="hero-name">冒險者</div>
    <div class="hero-title" id="hero-title">Lv.1 新手</div>
  </div>

  <!-- MILESTONE -->
  <div class="milestone" id="milestone"></div>

  <!-- WEEKLY TRACKER -->
  <div class="tracker-card">
    <div class="tracker-top">
      <div class="tracker-title">⊞ 週習慣紀錄</div>
      <div class="week-nav">
        <button id="btn-prev" onclick="shiftWeek(-1)">◀</button>
        <div class="week-label" id="week-label"></div>
        <button id="btn-next" onclick="shiftWeek(1)" disabled>▶</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table class="tracker-table" id="tracker-table">
        <thead id="tracker-head"></thead>
        <tbody id="tracker-body"></tbody>
      </table>
    </div>
  </div>

  <!-- STREAK -->
  <div class="streak-row">
    <div class="streak-box">
      <div class="sb-top">
        <div class="sb-icon" id="flame">🔥</div>
        <div class="sb-val" id="streak-n">0</div>
      </div>
      <div class="sb-lbl">天連勝</div>
    </div>
    <div class="streak-box">
      <div class="sb-top">
        <div class="sb-icon">⚡</div>
        <div class="sb-val" id="s-xp">0</div>
      </div>
      <div class="sb-lbl">累積 XP</div>
    </div>
    <div class="streak-box">
      <div class="sb-top">
        <div class="sb-icon">✅</div>
        <div class="sb-val" id="s-done">0</div>
      </div>
      <div class="sb-lbl">今日完成</div>
    </div>
  </div>

  <!-- XP BAR -->
  <div class="xp-card">
    <div class="xp-top">
      <div class="lv-badge" id="lv-badge">LV.1 新手</div>
      <div class="xp-nums" id="xp-nums">0 / 100 XP</div>
    </div>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">今日任務</button>
    <button class="tab" onclick="switchTab('rewards')">獎勵殿堂</button>
  </div>

  <!-- TODAY -->
  <div id="tab-today">
    <div class="quest-list" id="quest-list"></div>
    <button class="add-btn" onclick="openAdd()">✦ 接受新任務</button>
  </div>

  <!-- REWARDS -->
  <div id="tab-rewards" style="display:none">
    <div class="reward-section">
      <div class="rs-title">⊛ 升級獎勵</div>
      <div id="lv-rewards"></div>
    </div>
    <div class="reward-section">
      <div class="rs-title">⊛ 連勝里程碑</div>
      <div id="st-rewards"></div>
    </div>
  </div>

</div>

<!-- ADD QUEST MODAL -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <div class="modal-title">✦ 新增任務</div>
    <label class="form-label">任務名稱 *</label>
    <input class="form-input" type="text" id="q-name" placeholder="例：閱讀 30 分鐘" maxlength="30">
    <label class="form-label">說明（選填）</label>
    <textarea class="form-input" id="q-desc" placeholder="描述任務內容..."></textarea>
    <label class="form-label">圖示</label>
    <div class="icon-grid" id="icon-grid"></div>
    <p class="img-hint">💡 可將自訂圖片放入 assets/ 資料夾，並在程式碼中替換圖示</p>
    <label class="form-label">XP 獎勵</label>
    <div class="xp-row">
      <button class="xp-pick sel" onclick="pickXP(this,10)">+10</button>
      <button class="xp-pick" onclick="pickXP(this,25)">+25</button>
      <button class="xp-pick" onclick="pickXP(this,50)">+50</button>
      <button class="xp-pick" onclick="pickXP(this,100)">+100</button>
    </div>
    <label class="form-label">完成獎勵（選填）</label>
    <input class="form-input" type="text" id="q-reward" placeholder="例：吃一顆糖、看 15 分鐘影片" maxlength="40">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeOverlay('add-overlay')">取消</button>
      <button class="btn-save" onclick="saveQuest()">接受任務</button>
    </div>
  </div>
</div>

<!-- LEVEL UP MODAL -->
<div class="overlay" id="lu-overlay">
  <div class="modal">
    <div class="lu-inner">
      <div class="lu-crest" id="lu-crest">🏆</div>
      <div class="lu-title" id="lu-title">升級！</div>
      <div class="lu-sub" id="lu-sub">你達到了新境界</div>
      <button class="btn-ok" onclick="closeOverlay('lu-overlay')">繼續征途</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── DATA ── */
const LEVELS=[
  {name:'新手',xp:0,icon:'🌱'},{name:'學徒',xp:100,icon:'📖'},
  {name:'探索者',xp:250,icon:'🧭'},{name:'冒險家',xp:500,icon:'🗺️'},
  {name:'勇士',xp:900,icon:'⚔️'},{name:'英雄',xp:1500,icon:'🛡️'},
  {name:'傳奇',xp:2500,icon:'👑'},{name:'神話',xp:4000,icon:'🌟'},
];
const LV_REWARDS=[
  {lv:2,icon:'🎖️',name:'學徒徽章解鎖'},
  {lv:3,icon:'🧭',name:'探索者稱號 — 解鎖無限任務'},
  {lv:5,icon:'⚔️',name:'勇士稱號 — 解鎖每週回顧'},
  {lv:7,icon:'👑',name:'傳奇稱號 — 解鎖特殊外觀'},
  {lv:8,icon:'🌟',name:'神話稱號 — 終極成就達成'},
];
const ST_REWARDS=[
  {days:3,icon:'✨',name:'3天：獲得「堅持者」標記'},
  {days:7,icon:'🔥',name:'7天：火焰徽章升級'},
  {days:14,icon:'💎',name:'14天：鑽石護盾解鎖'},
  {days:21,icon:'🚀',name:'21天：習慣養成達人'},
  {days:30,icon:'🏆',name:'30天：月亮守護者稱號'},
];
const ICONS=['⚔️','🛡️','🏹','🧪','📚','🏃','💧','🧘','🎯','💪','🍎','🎨','🎵','💻','🌅','✍️','🔬','🎮','☕','🌙','🗡️','🔮','🏆','💎'];

/* ── COLORS per quest (cycle) ── */
const Q_COLORS=['done-1','done-2','done-3','done-4','done-5','done-6','done-7'];

function loadState(){
  try{const r=localStorage.getItem('dq_rpg2');if(r)return JSON.parse(r);}catch(e){}
  return{
    streak:0,xp:0,totalCompleted:0,nextId:4,lastDate:'',
    history:{},
    quests:[
      {id:1,name:'喝 8 杯水',desc:'保持每日水分',icon:'💧',xp:10,reward:'',done:false},
      {id:2,name:'閱讀 30 分鐘',desc:'讀任何你喜歡的書',icon:'📚',xp:25,reward:'吃一顆糖',done:false},
      {id:3,name:'運動 20 分鐘',desc:'散步或居家運動',icon:'🏃',xp:50,reward:'看 15 分鐘影片',done:false},
    ]
  };
}
function save(){localStorage.setItem('dq_rpg2',JSON.stringify(S));}

let S=loadState();
let weekOffset=0;
let selIcon='⚔️',selXP=10,toastTimer=null;

/* ── DAILY RESET ── */
(function checkReset(){
  const today=new Date().toDateString();
  if(S.lastDate&&S.lastDate!==today){
    if(S.quests.length>0&&!S.quests.every(q=>q.done))S.streak=0;
    S.quests.forEach(q=>q.done=false);
  }
  S.lastDate=today;save();
})();

/* ── LEVEL ── */
function getLv(xp){
  let lv=1,info=LEVELS[0];
  for(let i=1;i<LEVELS.length;i++)if(xp>=LEVELS[i].xp){lv=i+1;info=LEVELS[i];}
  const next=LEVELS[lv]||null;
  const pxp=info.xp,nxp=next?next.xp:pxp;
  const pct=next?Math.min(100,Math.round((xp-pxp)/(nxp-pxp)*100)):100;
  return{lv,name:info.name,icon:info.icon,pct,label:next?`${xp-pxp} / ${nxp-pxp} XP`:'MAX'};
}

/* ── WEEK UTILS ── */
function getWeekStart(offset){
  const d=new Date();
  const dow=d.getDay(); // 0=Sun
  const mon=new Date(d);
  mon.setDate(d.getDate()-((dow+6)%7)+offset*7);
  mon.setHours(0,0,0,0);
  return mon;
}
function dateKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(d){return dateKey(d)===dateKey(new Date());}
function isFuture(d){return d>new Date();}

/* ── TRACKER RENDER ── */
function renderTracker(){
  const ws=getWeekStart(weekOffset);
  const we=new Date(ws); we.setDate(ws.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('week-label').textContent=`${fmt(ws)} — ${fmt(we)}`;
  document.getElementById('btn-prev').disabled=weekOffset<=-12;
  document.getElementById('btn-next').disabled=weekOffset>=0;

  const days=['一','二','三','四','五','六','日'];
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);dates.push(d);}

  // head
  document.getElementById('tracker-head').innerHTML=`<tr>
    <th class="col-name">任務</th>
    ${dates.map((d,i)=>`<th class="${isToday(d)?'today-col':''}">${days[i]}<br><span style="font-size:9px;color:var(--text3)">${d.getDate()}</span></th>`).join('')}
  </tr>`;

  // body
  const tbody=document.getElementById('tracker-body');
  tbody.innerHTML='';
  if(S.quests.length===0){
    tbody.innerHTML=`<tr><td colspan="8" style="text-align:center;padding:12px;color:var(--text3);font-size:12px">暫無任務</td></tr>`;
    return;
  }
  S.quests.forEach((q,qi)=>{
    const colorCls=Q_COLORS[qi%Q_COLORS.length];
    const tr=document.createElement('tr');
    let cells=`<td class="task-name">${q.icon} ${q.name}</td>`;
    dates.forEach(d=>{
      const key=dateKey(d);
      const todayFlag=isToday(d);
      const futureFlag=isFuture(d)&&!todayFlag;
      const done=S.history[key]&&S.history[key].includes(q.id);
      let cls='dot';
      if(futureFlag) cls+=' future';
      else if(done) cls+=` ${colorCls}`;
      else cls+=' empty';
      if(todayFlag&&!futureFlag) cls+=' today-col';
      cells+=`<td><div class="${cls}">${done?'✓':''}</div></td>`;
    });
    tr.innerHTML=cells;
    tbody.appendChild(tr);
  });
}

/* ── MAIN RENDER ── */
function render(){
  const lv=getLv(S.xp);
  document.getElementById('hero-title').textContent=`Lv.${lv.lv} ${lv.name}`;
  document.getElementById('lv-badge').textContent=`LV.${lv.lv} ${lv.name}`;
  document.getElementById('xp-nums').textContent=lv.label;
  document.getElementById('xp-fill').style.width=lv.pct+'%';
  document.getElementById('streak-n').textContent=S.streak;
  document.getElementById('s-xp').textContent=S.xp;
  const done=S.quests.filter(q=>q.done).length;
  document.getElementById('s-done').textContent=done;

  // quests
  const ql=document.getElementById('quest-list');
  ql.innerHTML='';
  if(S.quests.length===0){
    ql.innerHTML=`<div class="empty-state"><div class="e-icon">📜</div>任務欄空空如也<br>接受你的第一個任務吧</div>`;
  }else{
    S.quests.forEach(q=>{
      const div=document.createElement('div');
      div.className='quest-card'+(q.done?' done':'');
      div.id='qc-'+q.id;
      div.onclick=()=>complete(q.id);
      div.innerHTML=`
        <div class="q-check">${q.done?'✓':''}</div>
        <div class="q-icon">${q.icon}</div>
        <div class="q-body">
          <div class="q-title">${q.name}</div>
          ${q.desc?`<div class="q-desc">${q.desc}</div>`:''}
          ${q.reward?`<span class="q-reward-tag">🎁 ${q.reward}</span>`:''}
        </div>
        <span class="q-xp">+${q.xp} XP</span>
      `;
      ql.appendChild(div);
    });
  }

  // rewards
  document.getElementById('lv-rewards').innerHTML=LV_REWARDS.map(r=>{
    const ul=lv.lv>=r.lv;
    return`<div class="reward-item"><span class="ri-icon">${r.icon}</span><span class="ri-name">${r.name}</span>${ul?'<span class="ri-ok">✓ 已解鎖</span>':`<span class="ri-lock">Lv.${r.lv}</span>`}</div>`;
  }).join('');
  document.getElementById('st-rewards').innerHTML=ST_REWARDS.map(r=>{
    const ul=S.streak>=r.days;
    return`<div class="reward-item"><span class="ri-icon">${r.icon}</span><span class="ri-name">${r.name}</span>${ul?'<span class="ri-ok">✓ 已解鎖</span>':`<span class="ri-lock">${r.days}天</span>`}</div>`;
  }).join('');

  renderTracker();
}

/* ── COMPLETE QUEST ── */
function complete(id){
  const q=S.quests.find(x=>x.id===id);
  if(!q||q.done)return;
  q.done=true;
  const prevLv=getLv(S.xp).lv;
  S.xp+=q.xp;S.totalCompleted++;

  // record in history
  const key=dateKey(new Date());
  if(!S.history[key])S.history[key]=[];
  if(!S.history[key].includes(q.id))S.history[key].push(q.id);

  const card=document.getElementById('qc-'+id);
  if(card){card.classList.add('flash');setTimeout(()=>card.classList.remove('flash'),500);}

  const allDone=S.quests.every(x=>x.done);
  if(allDone&&S.quests.length>0){
    S.streak++;
    const fl=document.getElementById('flame');
    fl.classList.add('pop');setTimeout(()=>fl.classList.remove('pop'),400);
    showToast('🔥 全部完成！連勝 +1 天');
    checkMilestone();
  }else{
    showToast(q.reward?`+${q.xp} XP ⚡ 記得：${q.reward}`:`+${q.xp} XP ⚡ 繼續加油`);
  }

  const newLv=getLv(S.xp).lv;
  if(newLv>prevLv){
    const li=getLv(S.xp);
    setTimeout(()=>{
      document.getElementById('lu-crest').textContent=li.icon;
      document.getElementById('lu-title').textContent=`升到 Lv.${li.lv} ${li.name}！`;
      document.getElementById('lu-sub').textContent=`累積 ${S.xp} XP，繼續征途！`;
      document.getElementById('lu-overlay').classList.add('open');
    },600);
  }
  save();render();
}

function checkMilestone(){
  const m=ST_REWARDS.find(r=>r.days===S.streak);
  if(m){
    const el=document.getElementById('milestone');
    el.textContent=`✦ 里程碑解鎖：${m.name}`;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),5000);
  }
}

function shiftWeek(dir){
  weekOffset=Math.max(-12,Math.min(0,weekOffset+dir));
  renderTracker();
}

function switchTab(t){
  document.getElementById('tab-today').style.display=t==='today'?'':'none';
  document.getElementById('tab-rewards').style.display=t==='rewards'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',(i===0&&t==='today')||(i===1&&t==='rewards'));
  });
}

function openAdd(){
  document.getElementById('q-name').value='';
  document.getElementById('q-desc').value='';
  document.getElementById('q-reward').value='';
  selIcon='⚔️';selXP=10;
  document.getElementById('icon-grid').innerHTML=ICONS.map(ic=>
    `<div class="icon-opt${ic===selIcon?' sel':''}" onclick="pickIcon(this,'${ic}')">${ic}</div>`
  ).join('');
  document.querySelectorAll('.xp-pick').forEach((el,i)=>el.classList.toggle('sel',i===0));
  document.getElementById('add-overlay').classList.add('open');
}

function pickIcon(el,ic){
  selIcon=ic;
  document.querySelectorAll('.icon-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}
function pickXP(el,xp){
  selXP=xp;
  document.querySelectorAll('.xp-pick').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}
function saveQuest(){
  const name=document.getElementById('q-name').value.trim();
  if(!name){document.getElementById('q-name').focus();return;}
  S.quests.push({id:S.nextId++,name,desc:document.getElementById('q-desc').value.trim(),icon:selIcon,xp:selXP,reward:document.getElementById('q-reward').value.trim(),done:false});
  closeOverlay('add-overlay');save();render();showToast('✦ 新任務已接受！');
}
function closeOverlay(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});

render();
</script>
</body>
</html>
