<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>每日任務</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --paper: #f5f4f0;
    --paper2: #eceae4;
    --paper3: #e2e0d8;
    --ink: #2c2a26;
    --ink2: #6b6760;
    --ink3: #a8a49e;
    --accent: #5c4a32;
    --accent2: #8b6f4e;
    --green: #2d6a4f;
    --line: rgba(44,42,38,0.1);
    --line2: rgba(44,42,38,0.06);
    --radius: 3px;
    --radius-md: 6px;
    --shadow: 0 1px 4px rgba(44,42,38,0.08), 0 0 0 1px rgba(44,42,38,0.06);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    background-image: repeating-linear-gradient(
      transparent, transparent 27px, var(--line2) 27px, var(--line2) 28px
    );
    background-attachment: fixed;
  }
  .app { max-width: 540px; margin: 0 auto; padding: 32px 20px 80px; }

  .header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 2px solid var(--ink);
  }
  .title-en { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--ink2); text-transform: uppercase; margin-bottom: 4px; }
  .title-zh { font-family: 'Noto Serif TC', serif; font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1.1; }
  .header-right { text-align: right; }
  .date-main { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ink2); }
  .date-day { font-family: 'Noto Serif TC', serif; font-size: 11px; color: var(--ink3); margin-top: 2px; }

  .streak-block {
    display: flex; margin-bottom: 14px;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow);
  }
  .streak-left { padding: 14px 18px; border-right: 1px solid var(--line); text-align: center; min-width: 82px; }
  .streak-fire { font-size: 24px; line-height: 1; margin-bottom: 2px; }
  .streak-fire.pop { animation: firePop 0.4s ease; }
  @keyframes firePop { 0%{transform:scale(1)} 50%{transform:scale(1.5) rotate(-5deg)} 100%{transform:scale(1)} }
  .streak-n { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--accent); line-height: 1; }
  .streak-lbl { font-size: 10px; color: var(--ink3); margin-top: 2px; letter-spacing: 0.5px; }
  .streak-right { flex: 1; padding: 12px 16px; }
  .week-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink3); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .week-row { display: flex; gap: 4px; }
  .wd { flex: 1; height: 26px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: 'DM Mono', monospace; }
  .wd-done { background: var(--accent); color: #fff; }
  .wd-today { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); font-weight: 500; }
  .wd-future { background: var(--paper2); color: var(--ink3); }

  .xp-block { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .lv-pill { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; background: var(--ink); color: var(--bg); padding: 3px 10px; border-radius: 2px; letter-spacing: 0.5px; }
  .xp-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink2); }
  .xp-track { height: 6px; border-radius: 2px; background: var(--paper2); border: 1px solid var(--line); overflow: hidden; }
  .xp-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.7s cubic-bezier(.4,1.3,.6,1); }

  .stats-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .stat-box { flex: 1; background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 10px 12px; box-shadow: var(--shadow); }
  .stat-n { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--ink); }
  .stat-l { font-size: 10px; color: var(--ink3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }

  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1.5px solid var(--ink); }
  .tab { padding: 8px 16px; background: transparent; border: none; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--ink2); cursor: pointer; position: relative; transition: color 0.15s; }
  .tab.active { color: var(--ink); font-weight: 500; }
  .tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: var(--ink); }

  .quest-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .quest-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 11px 14px; display: flex; align-items: center; gap: 11px; cursor: pointer; transition: background 0.15s, transform 0.1s; box-shadow: var(--shadow); }
  .quest-card:hover { background: var(--paper2); }
  .quest-card:active { transform: scale(0.99); }
  .quest-card.done { opacity: 0.45; }
  .quest-card.done .q-title { text-decoration: line-through; }
  .quest-card.flash { animation: stampFlash 0.5s ease; }
  @keyframes stampFlash { 0%{background:var(--paper)} 40%{background:#e8f5e9} 100%{background:var(--paper)} }

  .q-check { width: 20px; height: 20px; flex-shrink: 0; border: 1.5px solid var(--ink3); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; transition: all 0.2s; }
  .quest-card.done .q-check { background: var(--green); border-color: var(--green); color: white; }
  .q-icon { font-size: 20px; flex-shrink: 0; width: 30px; text-align: center; }
  .q-body { flex: 1; min-width: 0; }
  .q-title { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.3; }
  .q-desc { font-size: 12px; color: var(--ink2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-reward-tag { display: inline-block; margin-top: 4px; font-size: 10px; color: var(--accent2); padding: 1px 7px; border-radius: 2px; border: 1px solid var(--paper3); background: var(--paper2); font-family: 'DM Mono', monospace; }
  .q-xp { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--ink2); flex-shrink: 0; background: var(--paper2); border: 1px solid var(--line); padding: 3px 8px; border-radius: 2px; }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--ink3); font-size: 13px; font-family: 'Noto Serif TC', serif; }
  .empty-state .e-icon { font-size: 32px; margin-bottom: 10px; }

  .add-btn { width: 100%; padding: 10px; border: 1.5px dashed var(--paper3); border-radius: var(--radius-md); background: transparent; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--ink3); cursor: pointer; transition: all 0.15s; margin-bottom: 20px; }
  .add-btn:hover { border-color: var(--accent2); color: var(--accent2); background: var(--paper); }

  .reward-section { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
  .rs-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .reward-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--line2); font-size: 13px; }
  .reward-item:last-child { border-bottom: none; padding-bottom: 0; }
  .ri-icon { font-size: 16px; }
  .ri-name { flex: 1; color: var(--ink); }
  .ri-ok { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green); font-weight: 500; }
  .ri-lock { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink3); }

  .milestone { display: none; background: #fef9f0; border: 1px solid #e8c97a; border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; color: #7a5c1e; margin-bottom: 12px; animation: slideDown 0.3s ease; }
  .milestone.show { display: block; }
  @keyframes slideDown { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }

  .overlay { position: fixed; inset: 0; background: rgba(44,42,38,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(44,42,38,0.2); animation: modalIn 0.2s ease; }
  @keyframes modalIn { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 700; margin-bottom: 16px; color: var(--ink); }
  .form-label { display: block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink3); margin-bottom: 5px; margin-top: 12px; }
  .form-input { width: 100%; background: var(--paper); border: 1px solid var(--paper3); border-radius: var(--radius); padding: 8px 10px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: var(--ink); outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--ink3); }
  textarea.form-input { resize: vertical; min-height: 56px; }
  .icon-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .icon-opt { width: 36px; height: 36px; border-radius: var(--radius); background: var(--paper); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: all 0.1s; }
  .icon-opt:hover { border-color: var(--paper3); }
  .icon-opt.sel { border-color: var(--accent); background: #faf5ef; }
  .xp-row { display: flex; gap: 6px; margin-top: 6px; }
  .xp-pick { flex: 1; padding: 7px; border-radius: var(--radius); border: 1px solid var(--paper3); background: var(--paper); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--ink2); transition: all 0.1s; text-align: center; }
  .xp-pick:hover { border-color: var(--accent2); }
  .xp-pick.sel { border-color: var(--accent); background: #faf5ef; color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; margin-top: 18px; }
  .btn-cancel { flex: 1; padding: 9px; border: 1px solid var(--paper3); border-radius: var(--radius); background: transparent; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: var(--ink2); cursor: pointer; }
  .btn-cancel:hover { border-color: var(--ink3); color: var(--ink); }
  .btn-save { flex: 2; padding: 9px; border: none; border-radius: var(--radius); background: var(--ink); color: var(--bg); font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-save:hover { background: var(--accent); }

  .lu-inner { text-align: center; padding: 8px 0; }
  .lu-stamp { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--ink); display: flex; align-items: center; justify-content: center; font-size: 34px; margin: 0 auto 14px; }
  .lu-title { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .lu-sub { font-size: 13px; color: var(--ink2); margin-bottom: 20px; }
  .btn-ok { width: 100%; padding: 11px; border: none; border-radius: var(--radius); background: var(--ink); color: var(--bg); font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--ink); color: var(--bg); padding: 9px 18px; border-radius: var(--radius); font-size: 13px; font-family: 'Noto Sans TC', sans-serif; opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 500; white-space: nowrap; max-width: 88vw; box-shadow: 0 4px 20px rgba(44,42,38,0.3); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="title-block">
      <div class="title-en">Daily Quest</div>
      <div class="title-zh">每日任務</div>
    </div>
    <div class="header-right">
      <div class="date-main" id="date-main"></div>
      <div class="date-day" id="date-day"></div>
    </div>
  </div>

  <div class="milestone" id="milestone"></div>

  <div class="streak-block">
    <div class="streak-left">
      <div class="streak-fire" id="flame">🔥</div>
      <div class="streak-n" id="streak-n">0</div>
      <div class="streak-lbl">天連勝</div>
    </div>
    <div class="streak-right">
      <div class="week-label">本週紀錄</div>
      <div class="week-row" id="week-row"></div>
    </div>
  </div>

  <div class="xp-block">
    <div class="xp-row">
      <div class="lv-pill" id="lv-pill">LV.1 新手</div>
      <div class="xp-text" id="xp-text">0 / 100 XP</div>
    </div>
    <div class="xp-track">
      <div class="xp-fill" id="xp-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-n" id="s-done">0</div>
      <div class="stat-l">今日完成</div>
    </div>
    <div class="stat-box">
      <div class="stat-n" id="s-total">0</div>
      <div class="stat-l">任務總數</div>
    </div>
    <div class="stat-box">
      <div class="stat-n" id="s-xp">0</div>
      <div class="stat-l">累積 XP</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">今日任務</button>
    <button class="tab" onclick="switchTab('rewards')">獎勵記錄</button>
  </div>

  <div id="tab-today">
    <div class="quest-list" id="quest-list"></div>
    <button class="add-btn" onclick="openAdd()">＋ 新增任務</button>
  </div>

  <div id="tab-rewards" style="display:none">
    <div class="reward-section">
      <div class="rs-label">升級獎勵</div>
      <div id="lv-rewards"></div>
    </div>
    <div class="reward-section">
      <div class="rs-label">連勝里程碑</div>
      <div id="st-rewards"></div>
    </div>
  </div>

</div>

<div class="overlay" id="add-overlay">
  <div class="modal">
    <div class="modal-title">新增任務</div>
    <label class="form-label">任務名稱 *</label>
    <input class="form-input" type="text" id="q-name" placeholder="例：閱讀 30 分鐘" maxlength="30">
    <label class="form-label">說明（選填）</label>
    <textarea class="form-input" id="q-desc" placeholder="補充細節..."></textarea>
    <label class="form-label">圖示</label>
    <div class="icon-grid" id="icon-grid"></div>
    <label class="form-label">XP 值</label>
    <div class="xp-row">
      <button class="xp-pick sel" onclick="pickXP(this,10)">+10</button>
      <button class="xp-pick" onclick="pickXP(this,25)">+25</button>
      <button class="xp-pick" onclick="pickXP(this,50)">+50</button>
      <button class="xp-pick" onclick="pickXP(this,100)">+100</button>
    </div>
    <label class="form-label">完成後的獎勵（選填）</label>
    <input class="form-input" type="text" id="q-reward" placeholder="例：吃一顆糖、看 15 分鐘影片" maxlength="40">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeOverlay('add-overlay')">取消</button>
      <button class="btn-save" onclick="saveQuest()">加入任務</button>
    </div>
  </div>
</div>

<div class="overlay" id="lu-overlay">
  <div class="modal">
    <div class="lu-inner">
      <div class="lu-stamp" id="lu-stamp">🏆</div>
      <div class="lu-title" id="lu-title">升級！</div>
      <div class="lu-sub" id="lu-sub">你達到了新等級</div>
      <button class="btn-ok" onclick="closeOverlay('lu-overlay')">繼續加油</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LEVELS=[
  {name:'新手',xp:0,icon:'📝'},{name:'學徒',xp:100,icon:'📖'},
  {name:'探索者',xp:250,icon:'🧭'},{name:'冒險家',xp:500,icon:'🗺️'},
  {name:'勇士',xp:900,icon:'⚔️'},{name:'英雄',xp:1500,icon:'🛡️'},
  {name:'傳奇',xp:2500,icon:'👑'},{name:'神話',xp:4000,icon:'🌟'},
];
const LV_REWARDS=[
  {lv:2,icon:'📎',name:'學徒徽章解鎖'},
  {lv:3,icon:'🧭',name:'探索者稱號 — 解鎖無限任務'},
  {lv:5,icon:'⚔️',name:'勇士稱號 — 解鎖每週回顧'},
  {lv:7,icon:'👑',name:'傳奇稱號 — 解鎖特殊主題'},
  {lv:8,icon:'🌟',name:'神話稱號 — 終極成就達成'},
];
const ST_REWARDS=[
  {days:3,icon:'✨',name:'3天：獲得「堅持者」標記'},
  {days:7,icon:'🔥',name:'7天：火焰特效升級'},
  {days:14,icon:'💎',name:'14天：鑽石邊框解鎖'},
  {days:21,icon:'🚀',name:'21天：習慣養成達人'},
  {days:30,icon:'🏆',name:'30天：月亮守護者稱號'},
];
const ICONS=['📚','🏃','💧','🧘','🎯','💪','🍎','🎨','🎵','💻','🌅','✍️','🧹','🌿','🤸','🔬','🎮','☕','🧠','🌙','🏊','🚴','📝','🎤'];

function loadState(){
  try{const r=localStorage.getItem('dq_paper');if(r)return JSON.parse(r);}catch(e){}
  return{streak:0,xp:0,totalCompleted:0,nextId:4,lastDate:'',quests:[
    {id:1,name:'喝 8 杯水',desc:'保持每日水分',icon:'💧',xp:10,reward:'',done:false},
    {id:2,name:'閱讀 30 分鐘',desc:'讀任何你喜歡的書',icon:'📚',xp:25,reward:'吃一顆糖',done:false},
    {id:3,name:'運動 20 分鐘',desc:'散步或居家運動',icon:'🏃',xp:50,reward:'看 15 分鐘影片',done:false},
  ]};
}
function save(){localStorage.setItem('dq_paper',JSON.stringify(S));}

let S=loadState();

(function checkReset(){
  const today=new Date().toDateString();
  if(S.lastDate&&S.lastDate!==today){
    if(S.quests.length>0&&!S.quests.every(q=>q.done))S.streak=0;
    S.quests.forEach(q=>q.done=false);
  }
  S.lastDate=today; save();
})();

let selIcon='📚',selXP=10,toastTimer=null;

function getLv(xp){
  let lv=1,info=LEVELS[0];
  for(let i=1;i<LEVELS.length;i++)if(xp>=LEVELS[i].xp){lv=i+1;info=LEVELS[i];}
  const next=LEVELS[lv]||null;
  const pxp=info.xp,nxp=next?next.xp:pxp;
  const pct=next?Math.min(100,Math.round((xp-pxp)/(nxp-pxp)*100)):100;
  return{lv,name:info.name,icon:info.icon,pct,label:next?`${xp-pxp} / ${nxp-pxp} XP`:'MAX'};
}

function render(){
  const today=new Date();
  const weekdays=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  document.getElementById('date-main').textContent=
    `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('date-day').textContent=weekdays[today.getDay()];
  document.getElementById('streak-n').textContent=S.streak;

  const days=['一','二','三','四','五','六','日'];
  const dow=(today.getDay()+6)%7;
  document.getElementById('week-row').innerHTML=days.map((d,i)=>{
    const c=i<dow?'wd wd-done':i===dow?'wd wd-today':'wd wd-future';
    return`<div class="${c}">${d}</div>`;
  }).join('');

  const lv=getLv(S.xp);
  document.getElementById('lv-pill').textContent=`LV.${lv.lv} ${lv.name}`;
  document.getElementById('xp-text').textContent=lv.label;
  document.getElementById('xp-fill').style.width=lv.pct+'%';

  const done=S.quests.filter(q=>q.done).length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-total').textContent=S.quests.length;
  document.getElementById('s-xp').textContent=S.xp;

  const ql=document.getElementById('quest-list');
  ql.innerHTML='';
  if(S.quests.length===0){
    ql.innerHTML=`<div class="empty-state"><div class="e-icon">📋</div>暫無任務，請新增你的第一個任務</div>`;
  }else{
    S.quests.forEach(q=>{
      const div=document.createElement('div');
      div.className='quest-card'+(q.done?' done':'');
      div.id='qc-'+q.id;
      div.onclick=()=>complete(q.id);
      div.innerHTML=`
        <div class="q-check">${q.done?'✓':''}</div>
        <div class="q-icon">${q.icon}</div>
        <div class="q-body">
          <div class="q-title">${q.name}</div>
          ${q.desc?`<div class="q-desc">${q.desc}</div>`:''}
          ${q.reward?`<span class="q-reward-tag">獎勵 → ${q.reward}</span>`:''}
        </div>
        <span class="q-xp">+${q.xp}</span>
      `;
      ql.appendChild(div);
    });
  }

  document.getElementById('lv-rewards').innerHTML=LV_REWARDS.map(r=>{
    const ul=lv.lv>=r.lv;
    return`<div class="reward-item"><span class="ri-icon">${r.icon}</span><span class="ri-name">${r.name}</span>${ul?'<span class="ri-ok">✓ 已解鎖</span>':`<span class="ri-lock">Lv.${r.lv}</span>`}</div>`;
  }).join('');

  document.getElementById('st-rewards').innerHTML=ST_REWARDS.map(r=>{
    const ul=S.streak>=r.days;
    return`<div class="reward-item"><span class="ri-icon">${r.icon}</span><span class="ri-name">${r.name}</span>${ul?'<span class="ri-ok">✓ 已解鎖</span>':`<span class="ri-lock">${r.days}天</span>`}</div>`;
  }).join('');
}

function complete(id){
  const q=S.quests.find(x=>x.id===id);
  if(!q||q.done)return;
  q.done=true;
  const prevLv=getLv(S.xp).lv;
  S.xp+=q.xp; S.totalCompleted++;
  const card=document.getElementById('qc-'+id);
  if(card){card.classList.add('flash');setTimeout(()=>card.classList.remove('flash'),500);}
  const allDone=S.quests.every(x=>x.done);
  if(allDone&&S.quests.length>0){
    S.streak++;
    const fl=document.getElementById('flame');
    fl.classList.add('pop');setTimeout(()=>fl.classList.remove('pop'),400);
    showToast('🔥 全部完成！連勝 +1 天');
    checkMilestone();
  }else{
    showToast(q.reward?`+${q.xp} XP — 記得：${q.reward}`:`+${q.xp} XP，繼續加油`);
  }
  const newLv=getLv(S.xp).lv;
  if(newLv>prevLv){
    const li=getLv(S.xp);
    setTimeout(()=>{
      document.getElementById('lu-stamp').textContent=li.icon;
      document.getElementById('lu-title').textContent=`升到 Lv.${li.lv} ${li.name}`;
      document.getElementById('lu-sub').textContent=`累積 ${S.xp} XP`;
      document.getElementById('lu-overlay').classList.add('open');
    },600);
  }
  save();render();
}

function checkMilestone(){
  const m=ST_REWARDS.find(r=>r.days===S.streak);
  if(m){
    const el=document.getElementById('milestone');
    el.textContent=`${m.icon} 里程碑解鎖：${m.name}`;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),5000);
  }
}

function switchTab(t){
  document.getElementById('tab-today').style.display=t==='today'?'':'none';
  document.getElementById('tab-rewards').style.display=t==='rewards'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',(i===0&&t==='today')||(i===1&&t==='rewards'));
  });
}

function openAdd(){
  document.getElementById('q-name').value='';
  document.getElementById('q-desc').value='';
  document.getElementById('q-reward').value='';
  selIcon='📚';selXP=10;
  document.getElementById('icon-grid').innerHTML=ICONS.map(ic=>
    `<div class="icon-opt${ic===selIcon?' sel':''}" onclick="pickIcon(this,'${ic}')">${ic}</div>`
  ).join('');
  document.querySelectorAll('.xp-pick').forEach((el,i)=>el.classList.toggle('sel',i===0));
  document.getElementById('add-overlay').classList.add('open');
}

function pickIcon(el,ic){
  selIcon=ic;
  document.querySelectorAll('.icon-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}
function pickXP(el,xp){
  selXP=xp;
  document.querySelectorAll('.xp-pick').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}
function saveQuest(){
  const name=document.getElementById('q-name').value.trim();
  if(!name){document.getElementById('q-name').focus();return;}
  S.quests.push({id:S.nextId++,name,desc:document.getElementById('q-desc').value.trim(),icon:selIcon,xp:selXP,reward:document.getElementById('q-reward').value.trim(),done:false});
  closeOverlay('add-overlay');save();render();showToast('任務已加入');
}
function closeOverlay(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});
render();
</script>
</body>
</html>
